<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wakatobi Update</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="header-top">
<div class="logo">Wakatobi Update</div>
</div>

</header>

<section class="article">

<h1 id="title"></h1>

<p id="date"></p>

<img id="image">

<p id="content"></p>

</section>

<script>

const params = new URLSearchParams(window.location.search)

const id = params.get("id")

fetch("news.json")
.then(res => res.json())
.then(data => {

let news = data[id]

document.getElementById("title").innerText = news.title
document.getElementById("date").innerText = news.date
document.getElementById("content").innerText = news.content
document.getElementById("image").src = news.image

})

</script>

</body>
  </html>
