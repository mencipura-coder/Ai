<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard Pekerja</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6fb;
}

header{
background:#4f46e5;
color:white;
padding:15px 30px;
font-size:20px;
}

.container{
padding:30px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
margin-bottom:20px;
}

button{
padding:10px 18px;
border:none;
background:#4f46e5;
color:white;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<header>

Dashboard Pekerja

</header>

<div class="container">

<div class="card">

<h3>Profil Anda</h3>

<p>Nama : Andi</p>

<p>Skill : Kasir</p>

<p>Lokasi : Wakatobi</p>

<button>Edit Profil</button>

</div>

<div class="card">

<h3>Pekerjaan yang Cocok</h3>

<p>Kasir – Toko Elektronik</p>

<p>AI Match : 92%</p>

<button>Lihat Detail</button>

</div>

<div class="card">

<h3>Lamaran Anda</h3>

<p>Driver – Perusahaan Logistik</p>

<p>Status : Diproses</p>

</div>

</div>

</body>
</html>
